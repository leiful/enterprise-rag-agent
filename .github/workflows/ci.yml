name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: enterprise-rag-agent
  IMAGE_NAME: enterprise-rag-agent

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ai_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ai_agent_test
          APP_ENV: testing
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          CORS_ALLOW_LOCALHOST_REGEX: "true"
        run: python -m unittest discover -s tests -v

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker image
        run: |
          IMAGE="$TCR_REGISTRY/$TCR_NAMESPACE/$IMAGE_NAME"
          docker build -f backend/Dockerfile -t "$IMAGE:ci" .

      - name: Login to Tencent Cloud TCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.TCR_PASSWORD }}" | docker login "$TCR_REGISTRY" --username "${{ secrets.TCR_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="$TCR_REGISTRY/$TCR_NAMESPACE/$IMAGE_NAME"
          docker tag "$IMAGE:ci" "$IMAGE:latest"
          docker tag "$IMAGE:ci" "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
