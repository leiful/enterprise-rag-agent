name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: enterprise-rag-agent
  IMAGE_NAME: enterprise-rag-agent
  FRONTEND_IMAGE_NAME: nginx-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ai_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ai_agent_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ai_agent_test
          APP_ENV: test
          APP_USERNAME: admin
          APP_PASSWORD: strong-test-password
          DEEPSEEK_API_KEY: test-key
          CHAT_MODEL: test-chat-model
          CHAT_BASE_URL: https://api.deepseek.com
          EMBEDDING_API_KEY: test-embedding-key
          ENABLE_MULTI_QUERY: "false"
          PYTHONPATH: ..
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          CORS_ALLOW_LOCALHOST_REGEX: "true"
        run: python -m unittest discover -s tests -v

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          load: true
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile.nginx
          load: true
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
