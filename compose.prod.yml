services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16
    container_name: ai-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Run docker compose with --env-file .env.prod or export it in the shell.}
      POSTGRES_DB: ai_agent
    volumes:
      - /data/rag-agent/postgres:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_agent_user -d ai_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  milvus:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.6.5
    container_name: ai-agent-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      DEPLOY_MODE: STANDALONE
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - /data/rag-agent/milvus:/var/lib/milvus
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/19530'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
    image: ccr.ccs.tencentyun.com/enterprise-rag-agent/enterprise-rag-agent:latest
    container_name: ai-agent-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - backend_network
    volumes:
      - /data/rag-agent/knowledge:/app/knowledge_files
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  nginx:
    image: ccr.ccs.tencentyun.com/enterprise-rag-agent/nginx-frontend:latest
    container_name: ai-agent-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/rag-agent/certbot/www:/var/www/certbot:ro
      - /data/rag-agent/certbot/conf:/etc/letsencrypt:ro
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  backend_network:
    driver: bridge
