services:
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    container_name: ai-agent-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ai_agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_agent
    ports:
      - "5432:5432"
    volumes:
      - ai_agent_postgres_data:/var/lib/postgresql/data

volumes:
  ai_agent_postgres_data:
